<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="auto">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Listagem de Clientes · Locadora</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>

<body class="bg-body-tertiary min-vh-100">

  <!-- Navbar -->
  <header data-bs-theme="dark">
    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">Locadora</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarCollapse"
          aria-controls="navbarCollapse"
          aria-expanded="false"
          aria-label="Alternar navegação"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <ul class="navbar-nav me-auto mb-2 mb-md-0">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Início</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="listagem-clientes.html">Clientes</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="cadastro-veiculos.html">Veículos</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Conteúdo -->
  <div class="container" style="padding-top: 80px;">
    <main>

      <div class="py-4 d-flex justify-content-between align-items-center">
        <div>
          <h1 class="h2">Listagem de Clientes</h1>
          <p class="lead mb-0">Todos os clientes cadastrados no sistema.</p>
        </div>
        <a href="cadastro-clientes.html" class="btn btn-primary">+ Novo Cliente</a>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered align-middle">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Nome Completo</th>
              <th>CPF</th>
              <th>E-mail</th>
              <th>Telefone</th>
            </tr>
          </thead>
          <tbody id="tabelaClientes">
            <tr id="semClientes">
              <td colspan="5" class="text-center text-muted">Nenhum cliente cadastrado.</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const clientes = JSON.parse(localStorage.getItem('clientes') || '[]');
    const tbody = document.getElementById('tabelaClientes');
    const semClientes = document.getElementById('semClientes');

    if (clientes.length > 0) {
      semClientes.remove();

      clientes.forEach(function (cliente, index) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${cliente.nome}</td>
          <td>${cliente.cpf}</td>
          <td>${cliente.email}</td>
          <td>${cliente.telefone}</td>
        `;
        tbody.appendChild(tr);
      });
    }
  </script>

</body>
</html>
